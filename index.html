<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>송아지 중탄산량(Bicarbonate) 투여량 계산기</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f5f7fa;
            color: #333;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .container {
            background-color: #ffffff;
            max-width: 500px;
            width: 100%;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        h2 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 25px;
            font-size: 1.4rem;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            font-weight: bold;
            margin-bottom: 8px;
            color: #4a5568;
        }
        .radio-group {
            display: flex;
            gap: 15px;
            background: #edf2f7;
            padding: 10px;
            border-radius: 8px;
        }
        .radio-label {
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            font-weight: normal;
        }
        input[type="number"] {
            width: 100%;
            padding: 12px;
            border: 1px solid #cbd5e0;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 1rem;
        }
        input[type="number"]:focus {
            outline: none;
            border-color: #3182ce;
            box-shadow: 0 0 0 3px rgba(66, 153, 225, 0.5);
        }
        button {
            width: 100%;
            padding: 14px;
            background-color: #3182ce;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        button:hover {
            background-color: #2b6cb0;
        }
        .result-box {
            margin-top: 25px;
            padding: 15px;
            background-color: #f7fafc;
            border-left: 5px solid #3182ce;
            border-radius: 4px;
            display: none;
        }
        .result-title {
            font-weight: bold;
            font-size: 1.1rem;
            color: #2d3748;
            margin-bottom: 12px;
            border-bottom: 1px solid #e2e8f0;
            padding-bottom: 5px;
        }
        .result-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 1rem;
        }
        .result-val {
            font-weight: bold;
            color: #2b6cb0;
        }
        .range-box {
            margin-top: 15px;
            background-color: #ebf8ff;
            border: 1px dashed #bee3f8;
            padding: 12px;
            border-radius: 6px;
            text-align: center;
            font-weight: bold;
            color: #2b6cb0;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>송아지 Bicarbonate Deficit 계산기</h2>
    
    <!-- 1. 연령 그룹 선택 -->
    <div class="form-group">
        <label>연령 그룹 (Age Group)</label>
        <div class="radio-group">
            <label class="radio-label">
                <input type="radio" name="ageGroup" value="early" checked> Early (1 - 10일령)
            </label>
            <label class="radio-label">
                <input type="radio" name="ageGroup" value="late"> Late (11 - 20일령)
            </label>
        </div>
    </div>

    <!-- 2. 체중 입력 -->
    <div class="form-group">
        <label for="weight">송아지 체중 (Calf Weight, kg)</label>
        <input type="number" id="weight" placeholder="예: 40" step="0.1" required>
    </div>

    <!-- 3. 현재 HCO3 입력 -->
    <div class="form-group">
        <label for="hco3">현재 HCO₃⁻ 수치 (mmol/L)</label>
        <input type="number" id="hco3" placeholder="예: 12.5" step="0.1" required>
    </div>

    <button onclick="calculateBicarbonate()">투여량 계산하기</button>

    <!-- 4. 결과 출력 박스 -->
    <div class="result-box" id="resultBox">
        <div class="result-title">📊 추천 중탄산량 계산 결과</div>
        <div class="result-item">
            <span>Target pH 7.20 기준 수치:</span>
            <span class="result-val" id="resLow">0 mmol</span>
        </div>
        <div class="result-item">
            <span>Target pH 7.36 기준 수치:</span>
            <span class="result-val" id="resHigh">0 mmol</span>
        </div>
        
        <div class="range-box" id="rangeSuggestion">
            추천 투여 범위: 0 ~ 0 mmol
        </div>
    </div>
</div>

<script>
function calculateBicarbonate() {
    // 입력값 가져오기
    const ageGroup = document.querySelector('input[name="ageGroup"]:checked').value;
    const weight = parseFloat(document.getElementById('weight').value);
    const hco3 = parseFloat(document.getElementById('hco3').value);

    // 유효성 검사
    if (isNaN(weight) || isNaN(hco3)) {
        alert("체중과 HCO3 수치를 올바르게 입력해 주세요.");
        return;
    }

    let targetLow_desired, targetHigh_desired, abs;

    // 공식 대입
    if (ageGroup === 'early') {
        targetLow_desired = 19.5;
        targetHigh_desired = 28.1;
        abs = 0.46;
    } else { // late
        targetLow_desired = 15.4;
        targetHigh_desired = 22.2;
        abs = 0.54;
    }

    // Deficit 계산
    let deficitLow = (targetLow_desired - hco3) * weight * abs;
    let deficitHigh = (targetHigh_desired - hco3) * weight * abs;

    // 음수 값 처리 (현재 수치가 타겟보다 높은 경우 0 처리)
    if (deficitLow < 0) deficitLow = 0;
    if (deficitHigh < 0) deficitHigh = 0;

    // 화면에 반영 (소수점 첫째자리까지 표시)
    document.getElementById('resLow').innerText = deficitLow.toFixed(1) + " mmol";
    document.getElementById('resHigh').innerText = deficitHigh.toFixed(1) + " mmol";
    
    document.getElementById('rangeSuggestion').innerText = 
        `💡 임상 추천 투여 범위: ${deficitLow.toFixed(1)} ~ ${deficitHigh.toFixed(1)} mmol`;

    // 결과창 보여주기
    document.getElementById('resultBox').style.display = 'block';
}
</script>

</body>
</html>
